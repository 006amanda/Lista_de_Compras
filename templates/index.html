<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<title>Lista de Compras</title>
		<link
			rel="stylesheet"
			href="{{ url_for('static', filename='style.css') }}"
		/>
		<script src="https://unpkg.com/htmx.org@1.9.10"></script>
	</head>

	<body>
		<h1>Lista de Compras</h1>

		<form id="form-item">
			<input
				type="text"
				id="item"
				name="item"
				placeholder="Adicionar item..."
				autocomplete="off"
				required
			/>
			<button type="submit">Adicionar</button>
		</form>

		<div class="container">
			<div class="card">
				<h2>🛒 Comprar</h2>
				<ul id="lista-comprar">
					{% for item in itens %}
					<li class="item">
						<label>
							<input
								type="checkbox"
								hx-get="/check/{{ loop.index0 }}"
								hx-target="body"
								hx-swap="innerHTML"
							/>
							<span>{{ item }}</span>
						</label>
					</li>
					{% else %}
					<li class="empty">Nenhum item na lista</li>
					{% endfor %}
				</ul>
			</div>

			<div class="card">
				<h2>✅ Comprados</h2>
				<ul>
					{% for item in comprados %}
					<li class="item done">
						<label>
							<input
								type="checkbox"
								checked
								hx-get="/uncheck/{{ loop.index0 }}"
								hx-target="body"
								hx-swap="innerHTML"
							/>
							<span>{{ item }}</span>
						</label>
					</li>
					{% else %}
					<li class="empty">Nada comprado ainda</li>
					{% endfor %}
				</ul>
			</div>
		</div>

		<!-- Modal -->
		<div id="modal" class="modal" style="display: none">
			<div class="modal-content">
				<h3>Quantidade do item</h3>
				<input type="number" id="quantidade" min="1" value="1" />

				<div class="modal-buttons">
					<button type="button" onclick="confirmar()">Confirmar</button>
					<button type="button" onclick="fecharModal()">Cancelar</button>
				</div>
			</div>
		</div>

		<script>
			let itemTemp = '';

			const formItem = document.getElementById('form-item');
			const inputPrincipal = document.getElementById('item');

			formItem.addEventListener('submit', function (e) {
				e.preventDefault();

				itemTemp = inputPrincipal.value.trim();
				if (itemTemp === '') return;

				// Exibe modal
				const modal = document.getElementById('modal');
				modal.style.display = 'flex';

				// Limpa seleção do input principal
				document.activeElement.blur();

				// Define valor inicial do modal
				const inputQtd = document.getElementById('quantidade');
				inputQtd.value = '1';
				setTimeout(() => {
					inputQtd.focus();
					inputQtd.select();
				}, 50);
			});

			function fecharModal() {
				document.getElementById('modal').style.display = 'none';
				inputPrincipal.value = '';
				inputPrincipal.focus();
			}

			function confirmar() {
				const quantidade = document.getElementById('quantidade').value;

				if (!itemTemp) return;

				htmx.ajax('POST', '/add', {
					values: { item: `${itemTemp} (${quantidade})` },
					target: '#lista-comprar',
					swap: 'innerHTML',
				});

				itemTemp = '';
				fecharModal();
			}

			// Teclas de atalho para modal
			window.addEventListener('keydown', function (e) {
				const modal = document.getElementById('modal');
				if (modal.style.display === 'flex') {
					if (e.key === 'Enter') {
						e.preventDefault();
						confirmar();
					}
					if (e.key === 'Escape') {
						fecharModal();
					}
				}
			});
		</script>

		<footer class="footer">
			<p>© 2026 Lista de Compras • By 006amanda</p>
		</footer>
	</body>
</html>
